<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nacht 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  :root {
    --red: #ff0022;
    --bg:  #080808;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    cursor: crosshair;
    user-select: none;
  }

  /* ══════════════════════════════════════
     NACHT 1 TITEL INTRO
  ══════════════════════════════════════ */
  #nightTitle {
    position: fixed;
    inset: 0;
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    opacity: 1;
    transition: opacity 1s ease;
  }

  #nightTitle.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  #nightTitle span {
    font-size: clamp(32px, 8vw, 80px);
    letter-spacing: 14px;
    color: var(--red);
    text-transform: uppercase;
    text-shadow: 0 0 40px rgba(255,0,34,0.8), 0 0 80px rgba(255,0,34,0.4);
    animation: titlePulse 0.8s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%,100% { opacity: 0.7; }
    50%      { opacity: 1; }
  }

  /* ══════════════════════════════════════
     KANTOOR SCHERM (hoofd gameplay)
  ══════════════════════════════════════ */
  #office {
    position: fixed;
    inset: 0;
    z-index: 10;
    background: #0a0a0a;
    display: none;
  }

  #office.active { display: block; }

  /* kantoor achtergrond */
  #officeBg {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #0d0d0d 0%, #111 60%, #0a0a0a 100%);
  }

  /* plafond lamp sfeer */
  #officeBg::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 45%;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,200,100,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  /* scanlines */
  #office::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 90;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px
    );
  }

  /* ── DEUR ── */
  #door {
    position: absolute;
    left: 50%;
    top: 8%;
    transform: translateX(-50%);
    width: 28vw;
    max-width: 320px;
    height: 72vh;
    z-index: 20;
  }

  /* deur frame */
  #doorFrame {
    position: absolute;
    inset: 0;
    border: 4px solid #2a2a2a;
    border-radius: 4px 4px 0 0;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 0 20px rgba(0,0,0,0.9);
  }

  /* het gat in de deur - donkere gang */
  #doorHole {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #000 0%, #050505 100%);
    border-radius: 4px 4px 0 0;
    overflow: hidden;
  }

  /* Gijs verschijnt in het gat */
  #gijsInDoor {
    position: absolute;
    inset: 0;
    background-image: url('Images/GijsCam6.png');
    background-size: cover;
    background-position: center top;
    opacity: 0;
    transition: opacity 0.3s linear;
  }

  /* het deurpaneel zelf (beweegt omlaag bij sluiten) */
  #doorPanel {
    position: absolute;
    left: 0; right: 0;
    bottom: 0;
    height: 100%;
    background: linear-gradient(180deg, #1c1c1c 0%, #151515 50%, #111 100%);
    border: 2px solid #2a2a2a;
    border-top: 6px solid #333;
    transform: translateY(-100%);
    transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    z-index: 5;
  }

  #doorPanel.closed {
    transform: translateY(0%);
  }

  /* deur streepjes decoratie */
  #doorPanel::before {
    content: '';
    position: absolute;
    inset: 12px;
    border: 2px solid rgba(255,255,255,0.03);
    border-radius: 2px;
  }

  /* deur hendel / trek knop */
  #doorHandle {
    position: absolute;
    bottom: 18%;
    left: 50%;
    transform: translateX(-50%);
    width: 44px;
    height: 14px;
    background: #333;
    border: 2px solid #444;
    border-radius: 7px;
    cursor: pointer;
    z-index: 30;
    transition: background 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }

  #doorHandle:hover {
    background: #555;
    box-shadow: 0 0 12px rgba(255,100,0,0.3);
  }

  #doorHandle.disabled {
    cursor: default;
    opacity: 0.3;
  }

  /* deur label */
  #doorLabel {
    position: absolute;
    bottom: calc(18% - 28px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.15);
    white-space: nowrap;
    z-index: 30;
    pointer-events: none;
  }

  /* ── BUREAU / ONDERKANT ── */
  #desk {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 22vh;
    background: linear-gradient(180deg, #111 0%, #0d0d0d 100%);
    border-top: 2px solid #1e1e1e;
    z-index: 40;
  }

  /* camera knop */
  #camBtn {
    position: absolute;
    bottom: 28px;
    right: 36px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.6);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    padding: 10px 18px;
    cursor: pointer;
    text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s, box-shadow 0.2s;
  }

  #camBtn:hover {
    border-color: var(--red);
    color: #fff;
    box-shadow: 0 0 12px rgba(255,0,34,0.3);
  }

  /* tijd */
  #clock {
    position: absolute;
    bottom: 36px;
    left: 36px;
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.25);
  }

  /* nacht indicator */
  #nightLabel {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 5px;
    color: rgba(255,0,34,0.4);
    text-transform: uppercase;
  }

  /* ══════════════════════════════════════
     CAMERA OVERLAY
  ══════════════════════════════════════ */
  #cameraOverlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #000;
    display: none;
    flex-direction: column;
  }

  #cameraOverlay.active { display: flex; }

  /* camera feed */
  #camFeed {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
  }

  #camFeed img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  #camFeed img.active { display: block; }

  /* camera ruis overlay */
  #camNoise {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    opacity: 0.06;
  }

  /* camera scanlines */
  #camFeed::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 6;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 2px,
      rgba(0,0,0,0.3) 2px, rgba(0,0,0,0.3) 3px
    );
  }

  /* camera HUD bovenin */
  #camHud {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
  }

  #camHud .cam-label {
    font-size: 11px;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
  }

  #camHud .cam-rec {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--red);
    animation: blink 1s steps(1) infinite;
  }

  /* monster locatie indicator */
  #monsterIndicator {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 4px;
    color: rgba(255,0,34,0.5);
    text-transform: uppercase;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #monsterIndicator.visible { opacity: 1; }

  /* camera selectie balk */
  #camBar {
    height: 90px;
    background: rgba(0,0,0,0.92);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 0 16px;
    flex-shrink: 0;
  }

  .cam-thumb {
    flex: 1;
    max-width: 110px;
    height: 62px;
    background: #111;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .cam-thumb:hover    { border-color: rgba(255,255,255,0.25); }
  .cam-thumb.selected { border-color: var(--red); box-shadow: 0 0 8px rgba(255,0,34,0.3); }

  .cam-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.6;
  }

  .cam-thumb .cam-num {
    position: absolute;
    bottom: 4px;
    left: 6px;
    font-size: 8px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.5);
  }

  .cam-thumb.has-monster::after {
    content: '!';
    position: absolute;
    top: 4px; right: 6px;
    font-size: 10px;
    color: var(--red);
    animation: blink 0.5s steps(1) infinite;
  }

  /* sluit camera knop */
  #closeCam {
    position: absolute;
    top: 14px;
    right: 20px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.4);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    padding: 6px 12px;
    cursor: pointer;
    text-transform: uppercase;
    z-index: 20;
    transition: border-color 0.2s, color 0.2s;
  }

  #closeCam:hover {
    border-color: rgba(255,255,255,0.4);
    color: #fff;
  }

  /* ══════════════════════════════════════
     JUMPSCARE SCHERM
  ══════════════════════════════════════ */
  #jumpscareScreen {
    position: fixed;
    inset: 0;
    z-index: 500;
    display: none;
    background: #000;
  }

  #jumpscareScreen.active { display: block; }

  #jumpscareScreen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* ══════════════════════════════════════
     FADE OVERLAY
  ══════════════════════════════════════ */
  #fadeOverlay {
    position: fixed;
    inset: 0;
    z-index: 400;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }

  #fadeOverlay.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ══════════════════════════════════════
     UTILITIES
  ══════════════════════════════════════ */
  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0; }
  }

  /* vignette over kantoor */
  #officeVignette {
    position: absolute;
    inset: 0;
    z-index: 80;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 30%,
      rgba(0,0,0,0.7) 100%
    );
  }

  /* wanden links/rechts */
  #wallLeft, #wallRight {
    position: absolute;
    top: 0; bottom: 0;
    width: 18vw;
    z-index: 15;
    pointer-events: none;
  }
  #wallLeft  { left:  0; background: linear-gradient(90deg,  #080808 0%, transparent 100%); }
  #wallRight { right: 0; background: linear-gradient(270deg, #080808 0%, transparent 100%); }

  /* plafond strip */
  #ceiling {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8%;
    background: #0a0a0a;
    border-bottom: 1px solid #161616;
    z-index: 15;
  }

  /* lamp */
  #lamp {
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 6vh;
    background: #1a1a1a;
    z-index: 16;
  }
  #lamp::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 28px; height: 14px;
    background: #222;
    border-radius: 0 0 14px 14px;
    box-shadow: 0 0 20px rgba(255,200,80,0.08);
  }
</style>
</head>
<body>

<!-- ── NACHT 1 TITEL ── -->
<div id="nightTitle"><span>Nacht 1</span></div>

<!-- ── KANTOOR ── -->
<div id="office">
  <div id="officeBg"></div>
  <div id="ceiling"></div>
  <div id="lamp"></div>
  <div id="wallLeft"></div>
  <div id="wallRight"></div>

  <!-- deur -->
  <div id="door">
    <div id="doorHole">
      <div id="gijsInDoor"></div>
    </div>
    <div id="doorFrame"></div>
    <div id="doorPanel"></div>
    <div id="doorHandle" title="Trek deur dicht"></div>
    <div id="doorLabel">TREK OM TE SLUITEN</div>
  </div>

  <div id="officeVignette"></div>

  <!-- bureau -->
  <div id="desk">
    <div id="clock">00:00</div>
    <div id="nightLabel">— Nacht 1 —</div>
    <button id="camBtn">CAMERA'S</button>
  </div>
</div>

<!-- ── CAMERA OVERLAY ── -->
<div id="cameraOverlay">
  <div id="camFeed">
    <canvas id="camNoise"></canvas>
    <img id="camImg1" src="Images/GijsCam1.png" alt="Cam 1">
    <img id="camImg2" src="Images/GijsCam2.png" alt="Cam 2">
    <img id="camImg3" src="Images/GijsCam3.png" alt="Cam 3">
    <img id="camImg4" src="Images/GijsCam4.png" alt="Cam 4">
    <img id="camImg5" src="Images/GijsCam5.png" alt="Cam 5">
    <img id="camImg6" src="Images/GijsCam6.png" alt="Cam 6">

    <div id="camHud">
      <div class="cam-label" id="camName">CAM 1</div>
      <div class="cam-rec">● REC</div>
    </div>

    <div id="monsterIndicator">⚠ MEESTER GIJS GEDETECTEERD</div>
    <button id="closeCam">✕ SLUIT</button>
  </div>

  <div id="camBar">
    <div class="cam-thumb selected" data-cam="1">
      <img src="Images/GijsCam1.png" alt="">
      <span class="cam-num">CAM 1</span>
    </div>
    <div class="cam-thumb" data-cam="2">
      <img src="Images/GijsCam2.png" alt="">
      <span class="cam-num">CAM 2</span>
    </div>
    <div class="cam-thumb" data-cam="3">
      <img src="Images/GijsCam3.png" alt="">
      <span class="cam-num">CAM 3</span>
    </div>
    <div class="cam-thumb" data-cam="4">
      <img src="Images/GijsCam4.png" alt="">
      <span class="cam-num">CAM 4</span>
    </div>
    <div class="cam-thumb" data-cam="5">
      <img src="Images/GijsCam5.png" alt="">
      <span class="cam-num">CAM 5</span>
    </div>
    <div class="cam-thumb" data-cam="6">
      <img src="Images/GijsCam6.png" alt="">
      <span class="cam-num">CAM 6</span>
    </div>
  </div>
</div>

<!-- ── JUMPSCARE ── -->
<div id="jumpscareScreen">
  <img src="Images/GijsJumpscare.png" alt="JUMPSCARE">
</div>

<!-- ── FADE ── -->
<div id="fadeOverlay"></div>

<audio id="jumpscareAudio" src="Audio/Jumpscare.mp3"></audio>

<script>
// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
const STATE = {
  gijsPos:       1,          // camera 1 t/m 6, dan 'deur'
  doorClosed:    false,
  gameOver:      false,
  camOpen:       false,
  currentCam:    1,
  atDoor:        false,
  gijsOpacity:   0,
  fadeInterval:  null,
  attackTimeout: null,
  moveInterval:  null,
};

// cameravolgorde: 1 → 2 → 3 → 4 → 5 → 6 → deur
const CAM_PATH = [1, 2, 3, 4, 5, 6, 'deur'];

// ══════════════════════════════════════════════════════════
//  DOM REFS
// ══════════════════════════════════════════════════════════
const nightTitle      = document.getElementById('nightTitle');
const office          = document.getElementById('office');
const doorPanel       = document.getElementById('doorPanel');
const doorHandle      = document.getElementById('doorHandle');
const gijsInDoor      = document.getElementById('gijsInDoor');
const cameraOverlay   = document.getElementById('cameraOverlay');
const camFeed         = document.getElementById('camFeed');
const camName         = document.getElementById('camName');
const monsterIndicator= document.getElementById('monsterIndicator');
const jumpscareScreen = document.getElementById('jumpscareScreen');
const jumpscareAudio  = document.getElementById('jumpscareAudio');
const fadeOverlay     = document.getElementById('fadeOverlay');
const camBtn          = document.getElementById('camBtn');
const closeCamBtn     = document.getElementById('closeCam');
const camThumbs       = document.querySelectorAll('.cam-thumb');
const camImages       = {
  1: document.getElementById('camImg1'),
  2: document.getElementById('camImg2'),
  3: document.getElementById('camImg3'),
  4: document.getElementById('camImg4'),
  5: document.getElementById('camImg5'),
  6: document.getElementById('camImg6'),
};

// ══════════════════════════════════════════════════════════
//  CAMERA RUIS CANVAS
// ══════════════════════════════════════════════════════════
const noiseCanvas = document.getElementById('camNoise');
const noiseCtx    = noiseCanvas.getContext('2d');

function resizeNoise() {
  noiseCanvas.width  = noiseCanvas.offsetWidth  || window.innerWidth;
  noiseCanvas.height = noiseCanvas.offsetHeight || window.innerHeight;
}
resizeNoise();
window.addEventListener('resize', resizeNoise);

function drawNoise() {
  if (!STATE.camOpen) { requestAnimationFrame(drawNoise); return; }
  const w = noiseCanvas.width, h = noiseCanvas.height;
  const id = noiseCtx.createImageData(w, h);
  const d  = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.random() > 0.5 ? 255 : 0;
    d[i] = d[i+1] = d[i+2] = v;
    d[i+3] = 255;
  }
  noiseCtx.putImageData(id, 0, 0);
  requestAnimationFrame(drawNoise);
}
drawNoise();

// ══════════════════════════════════════════════════════════
//  INTRO: NACHT 1 TITEL
// ══════════════════════════════════════════════════════════
setTimeout(() => {
  nightTitle.classList.add('fade-out');
  setTimeout(() => {
    nightTitle.style.display = 'none';
    office.classList.add('active');
    startGame();
  }, 1100);
}, 2200);

// ══════════════════════════════════════════════════════════
//  GAME START
// ══════════════════════════════════════════════════════════
function startGame() {
  STATE.gijsPos = 1;
  STATE.doorClosed = false;
  STATE.gameOver   = false;
  STATE.atDoor     = false;
  STATE.gijsOpacity = 0;

  scheduleMoveGijs();
  updateCamThumbs();
}

// ══════════════════════════════════════════════════════════
//  GIJS BEWEGING
// ══════════════════════════════════════════════════════════
function scheduleMoveGijs() {
  if (STATE.gameOver) return;

  // willekeurige tijd tussen moves: 4-12 seconden
  const delay = 4000 + Math.random() * 8000;
  STATE.moveInterval = setTimeout(moveGijs, delay);
}

function moveGijs() {
  if (STATE.gameOver) return;

  const idx = CAM_PATH.indexOf(STATE.gijsPos);

  if (idx < CAM_PATH.length - 1) {
    STATE.gijsPos = CAM_PATH[idx + 1];
  }

  updateCamThumbs();

  if (STATE.gijsPos === 'deur') {
    // Gijs staat bij de deur
    STATE.atDoor = true;
    startGijsApproach();
  } else {
    scheduleMoveGijs();
  }
}

function updateCamThumbs() {
  camThumbs.forEach(thumb => {
    const n = parseInt(thumb.dataset.cam);
    thumb.classList.toggle('has-monster', STATE.gijsPos === n);
  });

  // monster indicator in camera feed
  if (STATE.camOpen) {
    monsterIndicator.classList.toggle(
      'visible',
      STATE.gijsPos === STATE.currentCam
    );
  }
}

// ══════════════════════════════════════════════════════════
//  GIJS NADERT DE DEUR
// ══════════════════════════════════════════════════════════
function startGijsApproach() {
  if (STATE.doorClosed) return; // deur al dicht, veilig

  // random tijd 5–20 seconden voordat aanval start
  const attackDelay = 5000 + Math.random() * 15000;

  STATE.gijsOpacity  = 0;
  gijsInDoor.style.opacity = '0';

  // langzaam opacity ophogen over de beschikbare tijd
  const fadeDuration = attackDelay * 0.9;
  const steps        = 60;
  const stepTime     = fadeDuration / steps;
  const stepAmount   = 1 / steps;
  let   s            = 0;

  STATE.fadeInterval = setInterval(() => {
    if (STATE.doorClosed || STATE.gameOver) {
      clearInterval(STATE.fadeInterval);
      gijsInDoor.style.opacity = '0';
      return;
    }
    s++;
    STATE.gijsOpacity = Math.min(1, s * stepAmount);
    gijsInDoor.style.opacity = STATE.gijsOpacity;
  }, stepTime);

  STATE.attackTimeout = setTimeout(() => {
    if (!STATE.doorClosed && !STATE.gameOver) {
      triggerJumpscare();
    }
  }, attackDelay);
}

// ══════════════════════════════════════════════════════════
//  DEUR SLUITEN
// ══════════════════════════════════════════════════════════
doorHandle.addEventListener('click', () => {
  if (STATE.doorClosed || STATE.gameOver) return;

  STATE.doorClosed = true;
  doorPanel.classList.add('closed');
  doorHandle.classList.add('disabled');

  // stop gijs approach
  clearInterval(STATE.fadeInterval);
  clearTimeout(STATE.attackTimeout);
  gijsInDoor.style.opacity = '0';

  // deur staat dicht — speler overleeft nacht 1
  // (hier kun je later de "nacht gewonnen" logica toevoegen)
});

// ══════════════════════════════════════════════════════════
//  JUMPSCARE
// ══════════════════════════════════════════════════════════
function triggerJumpscare() {
  if (STATE.gameOver) return;
  STATE.gameOver = true;

  clearInterval(STATE.fadeInterval);
  clearTimeout(STATE.attackTimeout);
  clearTimeout(STATE.moveInterval);

  jumpscareScreen.classList.add('active');
  jumpscareAudio.currentTime = 0;
  jumpscareAudio.play().catch(() => {});

  // na 3 seconden → main menu
  setTimeout(() => {
    fadeOverlay.classList.add('active');
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 700);
  }, 3000);
}

// ══════════════════════════════════════════════════════════
//  CAMERA SYSTEEM
// ══════════════════════════════════════════════════════════
camBtn.addEventListener('click', openCameras);
closeCamBtn.addEventListener('click', closeCameras);

function openCameras() {
  STATE.camOpen = true;
  cameraOverlay.classList.add('active');
  switchCam(STATE.currentCam);
}

function closeCameras() {
  STATE.camOpen = false;
  cameraOverlay.classList.remove('active');
}

function switchCam(n) {
  STATE.currentCam = n;

  // wissel feed afbeelding
  Object.values(camImages).forEach(img => img.classList.remove('active'));
  if (camImages[n]) camImages[n].classList.add('active');

  // update label
  camName.textContent = 'CAM ' + n;

  // highlight geselecteerde thumb
  camThumbs.forEach(t => {
    t.classList.toggle('selected', parseInt(t.dataset.cam) === n);
  });

  // monster indicator
  monsterIndicator.classList.toggle('visible', STATE.gijsPos === n);
}

camThumbs.forEach(thumb => {
  thumb.addEventListener('click', () => {
    switchCam(parseInt(thumb.dataset.cam));
  });
});

// ══════════════════════════════════════════════════════════
//  KLOK (decoratief)
// ══════════════════════════════════════════════════════════
const clockEl   = document.getElementById('clock');
let   clockSecs = 0;

setInterval(() => {
  if (STATE.gameOver) return;
  clockSecs++;
  const m = String(Math.floor(clockSecs / 60)).padStart(2, '0');
  const s = String(clockSecs % 60).padStart(2, '0');
  clockEl.textContent = m + ':' + s;
}, 1000);
</script>
</body>
</html>
