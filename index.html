<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Main Menu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  :root {
    --red: #ff0022;
    --cyan: #00ffe7;
    --bg: #080808;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    cursor: crosshair;
  }

  /* ── STATIC NOISE ── */
  #static {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.08;
    pointer-events: none;
  }

  /* ── SCANLINES ── */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.22) 3px,
      rgba(0,0,0,0.22) 4px
    );
  }

  /* ── VIGNETTE ── */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 35%,
      rgba(0,0,0,0.92) 100%
    );
  }

  /* ── LAYOUT ── */
  .layout {
    position: relative;
    z-index: 10;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8vw;
  }

  /* ── LEFT: BUTTONS ── */
  .left-panel {
    display: flex;
    flex-direction: column;
    gap: 18px;
    align-items: flex-start;
  }

  /* ── ENDURE BUTTON ── */
  .btn-endure {
    position: relative;
    background: transparent;
    border: none;
    color: #ffffff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    letter-spacing: 8px;
    text-transform: uppercase;
    padding: 10px 0;
    cursor: pointer;
    overflow: hidden;
    transition: text-shadow 0.15s;
  }

  .btn-endure:hover {
    text-shadow: 0 0 18px rgba(255,255,255,0.8);
  }

  .btn-endure span { position: relative; z-index: 1; }

  .btn-endure.g-shake  { animation: btnShake   0.35s linear; }
  .btn-endure.g-flicker{ animation: btnFlicker 0.4s steps(1); }
  .btn-endure.g-skew   { animation: btnSkew    0.35s ease-in-out; }
  .btn-endure.g-red    { animation: btnRed     0.5s ease; }

  @keyframes btnShake {
    0%,100% { transform: translate(0); }
    20% { transform: translate(-6px, 2px) skewX(4deg); }
    40% { transform: translate(6px, -2px) skewX(-4deg); }
    60% { transform: translate(-4px, 1px); }
    80% { transform: translate(4px, -1px); }
  }
  @keyframes btnFlicker {
    0%,100% { opacity:1; }
    15% { opacity:0; }
    30% { opacity:1; }
    50% { opacity:0.2; }
    65% { opacity:1; }
    80% { opacity:0; }
  }
  @keyframes btnSkew {
    0%,100% { transform: skewX(0); }
    30% { transform: skewX(-12deg) scaleX(1.08); }
    60% { transform: skewX(8deg) scaleX(0.94); }
  }
  @keyframes btnRed {
    0%,100% { box-shadow: 0 0 18px rgba(255,0,34,0.25); border-color: var(--red); }
    40% { box-shadow: 0 0 60px rgba(255,0,34,1), 0 0 120px rgba(255,0,34,0.5); border-color: #fff; filter: brightness(1.8); }
    70% { box-shadow: 0 0 30px rgba(255,0,34,0.7); }
  }

  /* ── GRATIS TEKST ── */
  .gratis {
    position: fixed;
    bottom: 22px;
    right: 28px;
    z-index: 20;
    font-family: 'Share Tech Mono', monospace;
    font-size: 32px;
    letter-spacing: 4px;
    text-transform: uppercase;
    white-space: nowrap;
    pointer-events: none;
    color: #ff0022;
    animation: gratisFlits 2.3s steps(1) infinite;
  }

  @keyframes gratisFlits {
    0%   { color: #ff0022; opacity: 1; }
    45%  { color: #ff0022; opacity: 1; }
    46%  { color: transparent; opacity: 0; }
    72%  { color: transparent; opacity: 0; }
    73%  { color: #ff0022; opacity: 1; }
    80%  { color: #ff0022; opacity: 1; }
    81%  { color: transparent; opacity: 0; }
    88%  { color: transparent; opacity: 0; }
    89%  { color: #ff0022; opacity: 1; }
    100% { color: #ff0022; opacity: 1; }
  }

  /* ── ESCAPE BUTTON ── */
  .btn-escape {
    position: relative;
    background: transparent;
    border: none;
    color: rgba(200,200,200,0.45);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    padding: 10px 0;
    cursor: pointer;
    transition: color 0.2s;
  }

  .btn-escape:hover { color: rgba(200,200,200,0.85); }
  .btn-escape span  { position: relative; z-index: 1; }

  /* ── RIGHT: TITLE ── */
  .right-panel {
    position: relative;
    width: 45vw;
    max-width: 700px;
    height: 50vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .title-ghost {
    position: absolute;
    inset: 0;
    background: url('UI/Title.png') center / contain no-repeat;
    opacity: 0;
    pointer-events: none;
    mix-blend-mode: screen;
  }

  .title-img {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 20px rgba(255,0,34,0.4));
    will-change: transform, opacity, filter;
  }

  /* ── WARNING OVERLAY ── */
  #startOverlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(8,8,8,0.93);
    cursor: pointer;
    gap: 28px;
    padding: 40px;
  }

  #startOverlay .warning-title {
    font-size: 28px;
    letter-spacing: 8px;
    color: var(--red);
    text-shadow: 0 0 24px rgba(255,0,34,0.8);
    animation: pulse 1.2s ease-in-out infinite;
  }

  #startOverlay .warning-body {
    font-size: 13px;
    letter-spacing: 3px;
    color: rgba(220,220,220,0.75);
    text-align: center;
    line-height: 2.2;
    max-width: 560px;
    text-transform: uppercase;
  }

  #startOverlay .warning-body strong {
    color: #fff;
    text-shadow: 0 0 8px rgba(255,255,255,0.4);
  }

  #startOverlay .warning-click {
    font-size: 11px;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.25);
    margin-top: 12px;
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 0.5; }
    50%      { opacity: 1; }
  }

  /* ── LORE SCREEN ── */
  #loreScreen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 50;
    background: #000;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  #loreScreen.active {
    display: flex;
  }

  #loreScreen .lore-scanlines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
  }

  #loreScreen .lore-inner {
    max-width: 680px;
    width: 100%;
    padding: 0 8vw;
    text-align: left;
  }

  #loreScreen .lore-night {
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--red);
    text-transform: uppercase;
    margin-bottom: 44px;
    opacity: 0.7;
  }

  #loreScreen .lore-text {
    font-size: 22px;
    letter-spacing: 2px;
    color: rgba(230,230,230,0.9);
    line-height: 1.7;
    min-height: 2em;
  }

  .lore-cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--red);
    margin-left: 3px;
    vertical-align: middle;
    animation: blink 0.7s steps(1) infinite;
  }

  .lore-cursor.hidden {
    display: none;
  }

  #loreScreen .lore-continue {
    margin-top: 60px;
    font-size: 11px;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.4s;
    animation: pulse 1.8s ease-in-out infinite;
  }

  #loreScreen .lore-continue.visible {
    opacity: 1;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  /* ── FADE OVERLAY ── */
  #fadeOverlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }

  #fadeOverlay.active {
    opacity: 1;
    pointer-events: all;
  }
</style>
</head>
<body>

<!-- click-to-start -->
<div id="startOverlay">
  <div class="warning-title">&#9888; WAARSCHUWING!</div>
  <div class="warning-body">
    DIT SPEL BEVAT <strong>HARDE GELUIDEN</strong> EN <strong>VEEL JUMPSCARES</strong>.<br>
    DIT SPEL BEVAT <strong>HUMOR DIE NIET IEDEREEN KAN WAARDEREN</strong>.<br>
    <strong>SPEEL OP EIGEN RISICO!!!</strong>
  </div>
  <div class="warning-click">— klik ergens om door te gaan —</div>
</div>

<!-- lore scherm -->
<div id="loreScreen">
  <div class="lore-scanlines"></div>
  <div class="lore-inner">
    <div class="lore-night">— NACHT 1 —</div>
    <div class="lore-text" id="loreText"></div>
    <div class="lore-continue" id="loreContinue">— klik om door te gaan —</div>
  </div>
</div>

<!-- fade voor transitions -->
<div id="fadeOverlay"></div>

<audio id="menuMusic"         src="Audio/Menu.mp3"         loop></audio>
<audio id="clickSound"        src="Audio/Click.mp3"             ></audio>
<audio id="intermissionAudio" src="Audio/Intermission.mp3" loop></audio>

<canvas id="static"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>

<div class="layout">
  <div class="left-panel">
    <button class="btn-endure" id="btnEndure"><span>ENDURE</span></button>
    <button class="btn-escape" id="btnEscape"><span>ESCAPE</span></button>
  </div>
  <div class="right-panel" id="titleWrap">
    <div class="title-ghost" id="ghostRed"  style="filter: hue-rotate(0deg)   saturate(10) brightness(1.3);"></div>
    <div class="title-ghost" id="ghostCyan" style="filter: hue-rotate(180deg) saturate(10) brightness(1.3);"></div>
    <img class="title-img" id="titleImg" src="UI/Title.png" alt="Title">
  </div>
</div>

<div class="gratis">NU GRATIS EDITIE &nbsp;— GRATIS GRATIS!!!!</div>

<script src="menu.js"></script>
<script src="lore.js"></script>
</body>
</html>
